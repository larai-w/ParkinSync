AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  ParkinSync - Caregiver log digitization pipeline.
  S3 upload -> Lambda -> Textract OCR -> weather enrichment -> Google Sheets.

Parameters:
  UploadBucketName:
    Type: String
    Default: parkinsync-uploads
    Description: S3 bucket that receives caregiver log images/PDFs
  SpreadsheetId:
    Type: String
    Default: 1aHdVYePaTQQ59feBWtPXBYPpsaMBO2KMcuXhwV3AFBE
    Description: Destination Google Spreadsheet ID
  SecretId:
    Type: String
    Default: ParkinSync/Production/GoogleCredentials
    Description: Secrets Manager secret holding Google credentials and API keys
  WeatherLat:
    Type: String
    Default: "35.38"
  WeatherLon:
    Type: String
    Default: "134.67"
  SnsTopicArn:
    Type: String
    Default: ""
    Description: Optional SNS topic ARN for error/review notifications (leave blank to disable)
  LogMonth:
    Type: String
    Default: ""
    Description: Optional override for month-less date cells, e.g. '2026-04'. Normally inferred from filename.

Conditions:
  HasSnsTopic: !Not [!Equals [!Ref SnsTopicArn, ""]]

Resources:
  UploadBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref UploadBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  ProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ParkinSyncProcessor
      CodeUri: src/
      Handler: lambda_function.lambda_handler
      Runtime: python3.12
      Timeout: 120
      MemorySize: 512
      Environment:
        Variables:
          SPREADSHEET_ID: !Ref SpreadsheetId
          SECRET_ID: !Ref SecretId
          WEATHER_LAT: !Ref WeatherLat
          WEATHER_LON: !Ref WeatherLon
          SNS_TOPIC_ARN: !Ref SnsTopicArn
          LOG_MONTH: !Ref LogMonth
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref UploadBucketName
        - Statement:
            - Effect: Allow
              Action: textract:AnalyzeDocument
              Resource: '*'
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${SecretId}*
            # Idempotency: read/write object tags; quarantine: copy within bucket
            - Effect: Allow
              Action:
                - s3:GetObjectTagging
                - s3:PutObjectTagging
                - s3:CopyObject
              Resource: !Sub arn:aws:s3:::${UploadBucketName}/*
            # SNS notifications for quarantine (no-op if SnsTopicArn is empty)
            - Effect: Allow
              Action: sns:Publish
              Resource: !If [HasSnsTopic, !Ref SnsTopicArn, !Sub 'arn:aws:sns:${AWS::Region}:${AWS::AccountId}:__none__']
      Events:
        LogUpload:
          Type: S3
          Properties:
            Bucket: !Ref UploadBucket
            Events: s3:ObjectCreated:*

Outputs:
  UploadBucketArn:
    Value: !GetAtt UploadBucket.Arn
  ProcessorFunctionArn:
    Value: !GetAtt ProcessorFunction.Arn
